version: '3.8'
services:
  postgres:
    image: postgres:16
    container_name: abs_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: ABS
    ports:
      - "5432:5432"
    volumes:
      - abs_pgdata:/var/lib/postgresql/data
      - ./files/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  abs_pgdata: